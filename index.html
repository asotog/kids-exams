<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exámenes de lectura</title>
    <style>
      :root {
        --ink: #20232b;
        --paper: #f6f2e8;
        --paper-2: #efe8d8;
        --indigo: #2c3e63;
        --indigo-deep: #1c2843;
        --seal: #a6392f;
        --line: #d8cfb8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Georgia", "Iowan Old Style", "Palatino Linotype", serif;
        line-height: 1.5;
        padding: 0 0 80px;
      }
      .topband {
        background: linear-gradient(180deg, var(--indigo-deep), var(--indigo));
        color: var(--paper);
        padding: 44px 24px 38px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .topband::after {
        content: "";
        position: absolute;
        right: -40px;
        top: -40px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: var(--seal);
        opacity: 0.18;
      }
      .eyebrow {
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 12px;
        opacity: 0.75;
        margin: 0 0 10px;
      }
      h1 {
        font-size: clamp(28px, 4vw, 40px);
        margin: 0 0 8px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .sub {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 14.5px;
        opacity: 0.85;
        max-width: 560px;
        margin: 0 auto;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 34px 22px 0;
      }
      .section-title {
        font-family: "Helvetica Neue", Arial, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        color: var(--seal);
        margin: 0 0 4px;
        font-weight: 700;
      }
      .section-desc {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        color: #665f4c;
        margin: 0 0 22px;
      }
      .exam-card {
        background: #fffdf8;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 22px 24px;
        margin-bottom: 16px;
        transition:
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }
      .exam-card:hover {
        border-color: #b7ac8b;
        box-shadow: 0 4px 18px rgba(28, 40, 67, 0.08);
      }
      .exam-eyebrow {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11.5px;
        color: var(--seal);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .exam-title {
        font-size: 22px;
        margin: 0 0 6px;
        font-weight: 600;
      }
      .exam-desc {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        color: #4d4736;
        margin: 0 0 18px;
      }
      .exam-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-decoration: none;
        border-radius: 999px;
        padding: 11px 22px;
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.1s ease,
          border-color 0.2s ease;
      }
      .btn-primary {
        color: #fff;
        background: var(--indigo);
        border: 1px solid var(--indigo);
      }
      .btn-primary:hover {
        background: var(--indigo-deep);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-ghost {
        color: var(--indigo);
        background: var(--paper);
        border: 1px solid var(--line);
      }
      .btn-ghost:hover {
        border-color: var(--indigo);
      }
      .footer-note {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 12.5px;
        color: #8a8266;
        text-align: center;
        margin-top: 34px;
      }
    </style>
  </head>
  <body>
    <div class="topband">
      <p class="eyebrow">Evaluaciones de lectura</p>
      <h1>Exámenes</h1>
      <p class="sub">
        Elige un examen para responderlo en línea o descarga la lectura en PDF
        para repasar antes.
      </p>
    </div>

    <div class="wrap">
      <p class="section-title">Exámenes disponibles</p>
      <p class="section-desc">
        Cada examen incluye su lectura asociada en formato PDF.
      </p>
      <div id="examList"></div>

      <p class="footer-note">
        Publicado con GitHub Pages · kids-exams
      </p>
    </div>

    <script>
      // ---------- EXAMS ----------
      // To add a new exam, drop its folder in the repo (with an index.html
      // and its lecture PDF) and add an entry here.
      const exams = [
        {
          title: "La historia de Japón",
          eyebrow: "Lectura de historia",
          desc: "25 preguntas: de los primeros pobladores Jomon a la reconstrucción moderna.",
          examUrl: "japan/",
          pdfUrl: "japan/lecture.pdf",
        },
      ];

      // ---------- RENDER ----------
      const examList = document.getElementById("examList");

      exams.forEach((exam) => {
        const card = document.createElement("div");
        card.className = "exam-card";

        const eyebrow = document.createElement("div");
        eyebrow.className = "exam-eyebrow";
        eyebrow.textContent = exam.eyebrow || "Examen";
        card.appendChild(eyebrow);

        const title = document.createElement("h2");
        title.className = "exam-title";
        title.textContent = exam.title;
        card.appendChild(title);

        if (exam.desc) {
          const desc = document.createElement("p");
          desc.className = "exam-desc";
          desc.textContent = exam.desc;
          card.appendChild(desc);
        }

        const actions = document.createElement("div");
        actions.className = "exam-actions";

        const take = document.createElement("a");
        take.className = "btn btn-primary";
        take.href = exam.examUrl;
        take.textContent = "Responder examen";
        actions.appendChild(take);

        if (exam.pdfUrl) {
          const pdf = document.createElement("a");
          pdf.className = "btn btn-ghost";
          pdf.href = exam.pdfUrl;
          pdf.target = "_blank";
          pdf.rel = "noopener";
          pdf.textContent = "📄 Lectura (PDF)";
          actions.appendChild(pdf);
        }

        card.appendChild(actions);
        examList.appendChild(card);
      });
    </script>
  </body>
</html>
